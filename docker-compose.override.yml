# ABOUTME: Local development override - automatically loaded with docker-compose.yml
# ABOUTME: Exposes ports on localhost and mounts source for hot reload

services:
  backend:
    container_name: forensics_backend_local
    build:
      target: dev
    ports:
      - "127.0.0.1:8010:8010"
    environment:
      - ENVIRONMENT=local
    volumes:
      - ./backend/src:/app/src
      - ./backend/pyproject.toml:/app/pyproject.toml
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8010/api/health']

  frontend:
    container_name: forensics_frontend_local
    build:
      target: dev
      args:
        BACKEND_URL: http://backend:8010
    ports:
      - "127.0.0.1:3001:3001"
    environment:
      - BACKEND_URL=http://backend:8010
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/next.config.ts:/app/next.config.ts
    depends_on:
      backend:
        condition: service_healthy
